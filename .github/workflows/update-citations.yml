name: Update Google Scholar Citations

on:
  schedule:
    - cron: "0 0 * * 1" # Monday
    - cron: "0 0 * * 3" # Wednesday
    - cron: "0 0 * * 5" # Friday
  workflow_dispatch:

permissions:
  contents: write
  actions: write

concurrency:
  group: update-citations
  cancel-in-progress: false

jobs:
  update-citations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run citation update script
        id: run_citation_update
        shell: bash
        run: |
          set +e
          start_time=$(date)
          timeout 90 python bin/update_scholar_citations.py
          status=$?
          end_time=$(date)
          if [ $status -eq 0 ]; then
            echo "succeeded=true" >> "$GITHUB_OUTPUT"
            echo "Citation update succeeded (started at $start_time, ended at $end_time)." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "succeeded=false" >> "$GITHUB_OUTPUT"
            echo "Citation update failed with exit code $status (started at $start_time, ended at $end_time)." >> "$GITHUB_STEP_SUMMARY"
            exit $status
          fi

      - name: Commit and push if changed
        id: commit
        if: steps.run_citation_update.outputs.succeeded == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/citations.yml
          if git diff --staged --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No citation changes to commit."
            exit 0
          fi
          git commit -m "chore: update Google Scholar citations"
          git push
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Trigger site deploy
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run "Deploy site" --ref main
