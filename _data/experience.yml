work:
  - title: PhD Researcher
    organization: Group of Machine Learning Research (GMUM)
    org_url: https://gmum.net/
    location: Kraków, Poland
    period: Oct 2024 – Present
    image: assets/img/experience/gmum.png
    highlights:
      - Conducting research on smarter visual representations for embodied artificial intelligence, with a focus on spatial awareness in visual foundation models.
      - Designing computer vision pipelines for Eurasian lynx re-identification in collaboration with the Wildlife Research Ecology Team, Institute of Environmental Sciences.
      - Developing semantic segmentation models to automate frog cell-size estimation for the Life History Evolution Group, Institute of Environmental Sciences.
      - Coordinating GMUM's social media presence and outreach to promote the group's research and strengthen its international visibility.

  - title: Data Scientist
    organization: Poznań Supercomputing and Networking Center (PSNC)
    org_url: https://www.psnc.pl/
    location: Poznań, Poland
    period: Mar 2022 – Jan 2025
    image: assets/img/experience/PSNC.png
    highlights:
      - Applied machine learning, statistical modeling, and large-scale time-series analytics to research and innovation projects in the ICT Energy Efficient Technologies Department.
      - Delivered anomaly detection, time-series forecasting, and simulation of renewable energy system configurations, including work on the EU-funded RENergetic project.
      - Developed a replicable ML workflow for multi-site energy forecasting that integrates with energy management systems without requiring in-house ML expertise.
      - Contributed to a recommendation-based Heat Demand Response (HDR) system that forecasts baseline consumption and proposes energy-saving measures when user-defined limits are exceeded.

  - title: Erasmus+ Internship
    organization: University of Catania
    org_url: https://www.dieei.unict.it/
    location: Catania, Italy
    period: Mar – Aug 2023
    image: assets/img/experience/UniCT.png
    highlights:
      - Research internship in the DIEEI Robotic Systems (ROSys) group on the BIOBLU project, supervised by Prof. Giovanni Muscato and Prof. Dario Calogero Guastella.
      - Built object detection and segmentation pipelines for robotic picking using YOLO, Mask R-CNN, and PCA-based methods with OpenCV, TensorFlow, and PyTorch.
      - Designed and validated AI-driven manipulation and control strategies in ROS and Gazebo across mobile robots and industrial manipulators (UR10e, AUBO i5, Kuka youBot).
      - Fine-tuned classification algorithms to improve picking accuracy and participated in the university robotics course as a guest student.

  - title: Erasmus+ Internship
    organization: Silesian University of Technology
    org_url: https://www.polsl.pl/en
    location: Gliwice, Poland
    period: Nov 2020 – Mar 2021
    image: assets/img/experience/silezya.png
    highlights:
      - 13-week research internship on clustering single-cell RNA sequencing data, supervised by Asst. Prof. Michał Marczyk.
      - Performed end-to-end scRNA-seq analysis in R, including quality control, normalization, UMAP visualization, and dropClust clustering on breast cancer data.
      - Tuned preprocessing and clustering parameters, ran differential expression analysis, and applied functional annotation to interpret cell populations.

  - title: Mandatory Internship & Graduation Project
    organization: Tescom UPS
    org_url: https://www.linkedin.com/company/tescom-ups
    location: Izmir, Turkey
    period: Sep 2019 – Sep 2020
    image: assets/img/experience/tescom.png
    highlights:
      - Completed an industry-linked BSc thesis (TÜBİTAK 2209-B) on high-efficiency LLC resonant converter design for UPS battery charging and charge–discharge regression modeling, with industrial support from Tescom Elektronik A.Ş.
      - Gained prior production experience at Tescom across PCB layout, in-circuit card testing, cabling, and final device testing.

